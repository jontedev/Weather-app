<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      transition: background 0.5s ease;
    }
    .clear { background: linear-gradient(135deg, #1a6fc4, #38b6ff); }
    .clouds { background: linear-gradient(135deg, #4a4a4a, #7a7a7a); }
    .rain { background: linear-gradient(135deg, #1a1a2e, #16213e); }
    .default { background: #121212; }
  </style>
</head>
<body class="text-white {% if weather %}
  {% if 'clear' in weather.description %}clear
  {% elif 'cloud' in weather.description %}clouds
  {% elif 'rain' in weather.description or 'drizzle' in weather.description %}rain
  {% else %}default{% endif %}
{% else %}default{% endif %}">

<div class="container mt-5">
  <h1 class="text-center mb-4">🌤 Weather App</h1>
  
  <form method="POST" class="d-flex gap-2 justify-content-center mb-4">
    <input type="text" name="city" class="form-control w-50" placeholder="Enter city name">
    <button type="submit" class="btn btn-primary">Search</button>
  </form>

  {% if error %}
  <div class="alert alert-danger text-center">{{ error }}</div>
  {% endif %}

  {% if weather %}
  <div class="card bg-transparent border-white text-white mx-auto" style="max-width: 400px;">
    <div class="card-body text-center">
      <h2>{{ weather.city }}</h2>
      <img src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png" alt="weather icon" width="100">
      <h1>{{ weather.temp }}°C</h1>
      <p class="text-capitalize">{{ weather.description }}</p>
      <hr>
      <p>💧 Humidity: {{ weather.humidity }}%</p>
      <p>💨 Wind: {{ weather.wind }} m/s</p>
    </div>
  </div>
  {% endif %}
</div>

<footer class="text-center mt-5 pb-3 text-white-50">
  Built by jontedev
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
